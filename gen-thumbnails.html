<!DOCTYPE html>
<html>
<head>
  <title>Thumbnail Generator</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    #grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .thumb { text-align: center; background: #2a2a3e; padding: 8px; border-radius: 4px; }
    .thumb img { display: block; margin: 0 auto 4px; image-rendering: pixelated; }
    .thumb .label { font-size: 10px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; margin: 8px 4px; }
    #status { margin-top: 12px; color: #8f8; }
  </style>
</head>
<body>
  <h2>Component Thumbnail Generator</h2>
  <p>Renders 3D thumbnails for all beamline components, equipment, and furnishings.</p>
  <button id="btn-render">Render All</button>
  <button id="btn-save" disabled>Save to assets/textures/thumbnails/</button>
  <div id="status"></div>
  <div id="grid"></div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script type="module">
    import { renderComponentThumbnail } from './src/renderer3d/component-builder.js';
    import { renderDecorationThumbnail } from './src/renderer3d/decoration-builder.js';
    import { COMPONENTS } from './src/data/components.js';
    import { PLACEABLES } from './src/data/placeables/index.js';
    import { DECORATIONS_RAW } from './src/data/decorations.raw.js';

    const status = document.getElementById('status');
    const grid = document.getElementById('grid');
    let rendered = [];

    // Collect component/placeable IDs — rendered via renderComponentThumbnail.
    function getComponentIds() {
      const ids = new Set();
      for (const k of Object.keys(COMPONENTS)) ids.add(k);
      for (const k of Object.keys(PLACEABLES)) ids.add(k);
      return [...ids];
    }
    // Decoration IDs — rendered via renderDecorationThumbnail.
    function getDecorationIds() {
      return Object.keys(DECORATIONS_RAW);
    }

    function addThumb(id, dataUrl) {
      rendered.push({ id, dataUrl });
      const div = document.createElement('div');
      div.className = 'thumb';
      const img = document.createElement('img');
      img.src = dataUrl;
      img.width = 64;
      img.height = 64;
      div.appendChild(img);
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = id;
      div.appendChild(label);
      grid.appendChild(div);
    }

    document.getElementById('btn-render').addEventListener('click', () => {
      rendered = [];
      grid.innerHTML = '';
      const compIds = getComponentIds();
      const decIds  = getDecorationIds();
      status.textContent = `Rendering ${compIds.length} components + ${decIds.length} decorations...`;

      for (const id of compIds) {
        const dataUrl = renderComponentThumbnail(id, 96);
        if (dataUrl) addThumb(id, dataUrl);
      }
      for (const id of decIds) {
        const dataUrl = renderDecorationThumbnail(id, 96);
        if (dataUrl) addThumb(id, dataUrl);
      }

      const total = compIds.length + decIds.length;
      status.textContent = `Done — ${rendered.length} thumbnails rendered (${total - rendered.length} skipped).`;
      document.getElementById('btn-save').disabled = false;
    });

    document.getElementById('btn-save').addEventListener('click', async () => {
      status.textContent = `Saving ${rendered.length} thumbnails to asset-gen server...`;
      try {
        const res = await fetch('http://localhost:3333/api/save-thumbnails', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ thumbnails: rendered }),
        });
        const data = await res.json();
        if (data.ok) {
          status.textContent = `Saved ${data.saved.length} PNGs to assets/textures/thumbnails/`;
        } else {
          status.textContent = `Error: ${JSON.stringify(data)}`;
        }
      } catch (e) {
        status.textContent = `Failed to save — is the asset-gen server running on port 3333? Error: ${e.message}`;
      }
    });
  </script>
</body>
</html>
