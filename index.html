<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beamline Tycoon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">

    <!-- Top resource bar (DOM overlay) -->
    <div id="top-bar">
      <div id="game-title">Beamline Tycoon</div>
      <div id="resources">
        <div class="res-box" id="res-funding" title="Funding">
          <span class="res-icon">$</span>
          <span class="res-val" id="val-funding">500</span>
        </div>
        <div class="res-box" id="res-energy" title="Power Draw (kW)">
          <span class="res-icon">kW</span>
          <span class="res-val" id="val-energy">--</span>
        </div>
        <div class="res-box" id="res-reputation" title="Reputation">
          <span class="res-icon">R</span>
          <span class="res-val" id="val-reputation">0</span>
        </div>
        <div class="res-box" id="res-data" title="Research Data">
          <span class="res-icon">D</span>
          <span class="res-val" id="val-data">0</span>
        </div>
      </div>
      <div id="top-buttons">
        <span id="beam-summary" class="beam-summary"></span>
        <button id="btn-designer" class="hud-btn">Beamline Designer</button>
        <button id="btn-designs" class="hud-btn">Designs</button>
        <button id="btn-research" class="hud-btn">Research</button>
        <button id="btn-goals" class="hud-btn">Goals</button>
        <div id="menu-wrapper">
          <button id="btn-menu" class="hud-btn">Menu</button>
          <div id="menu-dropdown" class="menu-dropdown hidden">
            <button class="menu-item" data-action="new-game">New Game</button>
            <button class="menu-item" data-action="save-game">Save Game</button>
            <button class="menu-item" data-action="load-game">Load Game</button>
            <div class="menu-divider"></div>
            <button class="menu-item" data-action="scenarios">Scenarios</button>
            <button class="menu-item" data-action="options">Options</button>
            <button class="menu-item" data-action="guide">Guide</button>
          </div>
        </div>
      </div>
    </div>

    <!-- System-level infrastructure stats panel (below top bar, facility mode only) -->
    <div id="system-stats-panel" class="hidden">
      <div id="system-stats-header">
        <span id="system-stats-title">VACUUM</span>
        <div id="system-stats-summary">
          <!-- populated dynamically by renderer -->
        </div>
        <button id="system-stats-toggle">+</button>
      </div>
      <div id="system-stats-detail">
        <!-- populated dynamically by renderer -->
      </div>
    </div>

    <!-- Beam parameters panel (top-left, transparent) -->
    <div id="beam-stats-panel">
      <div class="bsp-row"><span class="bsp-label">Energy</span><span class="bsp-val" id="stat-beam-energy">0.0</span><span class="bsp-unit" id="stat-beam-energy-unit">GeV</span></div>
      <div class="bsp-row"><span class="bsp-label">Quality</span><span class="bsp-val" id="stat-beam-quality">--</span></div>
      <div class="bsp-row"><span class="bsp-label">Current</span><span class="bsp-val" id="stat-beam-current">--</span><span class="bsp-unit">mA</span></div>
      <div class="bsp-row"><span class="bsp-label">Data</span><span class="bsp-val" id="stat-data-rate">0</span><span class="bsp-unit">/s</span></div>
      <div class="bsp-row"><span class="bsp-label">Length</span><span class="bsp-val" id="stat-length">0</span><span class="bsp-unit">m</span></div>
      <div class="bsp-row"><span class="bsp-label">E Cost</span><span class="bsp-val" id="stat-energy-cost">0</span><span class="bsp-unit">kW</span></div>
    </div>

    <!-- Beamline warnings panel (top-right) -->
    <div id="beamline-warnings"></div>

    <!-- Probe mode indicator -->
    <div id="probe-mode-indicator" class="hidden">PROBE MODE (P to toggle, click nodes to add probes, Esc to exit)</div>

    <!-- Component preview panel (lower-left, above bottom HUD) -->
    <div id="component-preview" class="hidden">
      <div id="preview-header">
        <span id="preview-name"></span>
      </div>
      <div id="preview-body">
        <div id="preview-desc"></div>
        <canvas id="preview-schematic" width="280" height="100"></canvas>
        <div id="preview-stats"></div>
      </div>
    </div>

    <!-- Bottom HUD (DOM overlay) -->
    <div id="bottom-hud">
      <div id="hud-controls">
        <div id="hud-top-row">
          <div id="mode-switcher">
            <div class="mode-btn-wrap">
              <button class="mode-btn active" data-mode="beamline">Beamline</button>
              <div class="mode-btn-sub" id="beamline-type-label"></div>
              <div class="machine-type-dropdown hidden" id="machine-type-dropdown">
                <!-- dynamically generated machine type options -->
              </div>
            </div>
            <button class="mode-btn" data-mode="facility">Facility</button>
            <button class="mode-btn" data-mode="structure">Structure</button>
            <button class="mode-btn" data-mode="grounds">Grounds</button>
            <button class="mode-btn mode-btn-demolish" data-mode="demolish">Demolish</button>
          </div>
          <div id="connection-tools">
            <!-- pipe/cable connection buttons -->
          </div>
        </div>
        <div id="category-tabs">
          <!-- dynamically generated based on active mode -->
        </div>
      </div>
      <div id="component-palette"></div>
    </div>

    <!-- Research tech tree (full-screen, hidden by default) -->
    <div id="research-overlay" class="tech-tree-overlay hidden">
      <div class="tt-header">
        <div class="tt-category-tabs" id="tt-category-tabs"></div>
        <div class="tt-active-research" id="tt-active-research"></div>
        <button class="overlay-close" data-close="research-overlay">&times;</button>
      </div>
      <div class="tt-canvas-wrapper" id="tt-canvas-wrapper">
        <svg class="tt-connectors" id="tt-connectors"></svg>
        <div class="tt-canvas" id="tt-canvas"></div>
      </div>
      <div class="tt-popover hidden" id="tt-popover"></div>
    </div>

    <!-- Goals overlay (hidden by default) -->
    <div id="goals-overlay" class="overlay hidden">
      <div class="overlay-header">
        <span class="overlay-title">Goals</span>
        <button class="overlay-close" data-close="goals-overlay">&times;</button>
      </div>
      <div class="overlay-body">
        <div id="goals-list"></div>
      </div>
    </div>

    <!-- Designs Library overlay (hidden by default) -->
    <div id="designs-overlay" class="overlay hidden">
      <div class="overlay-header">
        <span class="overlay-title">Designs</span>
        <button class="overlay-close" data-close="designs-overlay">&times;</button>
      </div>
      <div class="designs-category-tabs" id="designs-category-tabs"></div>
      <div class="overlay-body">
        <div id="designs-grid" class="designs-grid"></div>
      </div>
    </div>

    <!-- Component detail popup (hidden by default) -->
    <div id="component-popup" class="hidden">
      <div class="popup-header">
        <span class="popup-title"></span>
        <button class="popup-close">&times;</button>
      </div>
      <div class="popup-body"></div>
    </div>


    <!-- Beamline Designer View (full-screen, hidden by default) -->
    <div id="designer-overlay" class="designer-overlay hidden">
      <div class="dsgn-header">
        <span class="dsgn-title" id="dsgn-title">Beamline Designer</span>
        <div class="dsgn-draft-bar">
          <span class="dsgn-draft-summary" id="dsgn-draft-summary"></span>
          <span class="dsgn-draft-cost" id="dsgn-draft-cost"></span>
          <button class="dsgn-btn dsgn-insert-before" id="dsgn-insert-before" title="Insert Before Selected">+ Before</button>
          <button class="dsgn-btn dsgn-insert-after" id="dsgn-insert-after" title="Insert After Selected">+ After</button>
          <button class="dsgn-btn dsgn-save-design" id="dsgn-save-design" style="display:none">Save Design</button>
          <button class="dsgn-btn dsgn-save-as" id="dsgn-save-as" style="display:none">Save As</button>
          <button class="dsgn-btn dsgn-confirm" id="dsgn-confirm">Confirm</button>
          <button class="dsgn-btn dsgn-cancel" id="dsgn-cancel">Cancel</button>
        </div>
        <button class="overlay-close" id="dsgn-close">&times;</button>
      </div>
      <div class="dsgn-body">
        <div class="dsgn-schematic-row">
          <canvas id="dsgn-schematic-canvas"></canvas>
        </div>
        <div class="dsgn-tuning-row" id="dsgn-tuning-row">
          <div class="dsgn-tuning-info" id="dsgn-tuning-info">
            <div class="dsgn-tuning-name" id="dsgn-tuning-name">No component selected</div>
            <div class="dsgn-tuning-desc" id="dsgn-tuning-desc"></div>
          </div>
          <div class="dsgn-tuning-stats" id="dsgn-tuning-stats"></div>
          <div class="dsgn-tuning-params" id="dsgn-tuning-params">
          </div>
        </div>
        <div class="dsgn-plots-row">
          <div class="dsgn-plot-panel">
            <select class="dsgn-plot-select" data-panel="0">
              <option value="beam-envelope" selected>Beam Envelope</option>
              <option value="current-loss">Current &amp; Loss</option>
              <option value="emittance">Emittance</option>
              <option value="energy-dispersion">Energy &amp; Dispersion</option>
              <option value="peak-current">Peak Current</option>
              <option value="phase-space">Phase Space</option>
              <option value="longitudinal">Longitudinal PS</option>
            </select>
            <canvas class="dsgn-plot-canvas" data-panel="0"></canvas>
          </div>
          <div class="dsgn-plot-panel">
            <select class="dsgn-plot-select" data-panel="1">
              <option value="beam-envelope">Beam Envelope</option>
              <option value="current-loss">Current &amp; Loss</option>
              <option value="emittance" selected>Emittance</option>
              <option value="energy-dispersion">Energy &amp; Dispersion</option>
              <option value="peak-current">Peak Current</option>
              <option value="phase-space">Phase Space</option>
              <option value="longitudinal">Longitudinal PS</option>
            </select>
            <canvas class="dsgn-plot-canvas" data-panel="1"></canvas>
          </div>
          <div class="dsgn-plot-panel">
            <select class="dsgn-plot-select" data-panel="2">
              <option value="beam-envelope">Beam Envelope</option>
              <option value="current-loss">Current &amp; Loss</option>
              <option value="emittance">Emittance</option>
              <option value="energy-dispersion">Energy &amp; Dispersion</option>
              <option value="peak-current">Peak Current</option>
              <option value="phase-space" selected>Phase Space</option>
              <option value="longitudinal">Longitudinal PS</option>
            </select>
            <canvas class="dsgn-plot-canvas" data-panel="2"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div id="context-windows-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.4/full/pyodide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
