<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beamline Tycoon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game">

    <!-- Top resource bar (DOM overlay) -->
    <div id="top-bar">
      <div id="game-title">Beamline Tycoon</div>
      <div id="resources">
        <div class="res-box" id="res-funding" title="Funding">
          <span class="res-icon">$</span>
          <span class="res-val" id="val-funding">500</span>
        </div>
        <div class="res-box" id="res-energy" title="Energy">
          <span class="res-icon">E</span>
          <span class="res-val" id="val-energy">100</span>
        </div>
        <div class="res-box" id="res-reputation" title="Reputation">
          <span class="res-icon">R</span>
          <span class="res-val" id="val-reputation">0</span>
        </div>
        <div class="res-box" id="res-data" title="Research Data">
          <span class="res-icon">D</span>
          <span class="res-val" id="val-data">0</span>
        </div>
      </div>
      <div id="top-buttons">
        <button id="btn-research" class="hud-btn">Research</button>
        <button id="btn-goals" class="hud-btn">Goals</button>
        <button id="btn-new-game" title="Start a new game">New Game</button>
      </div>
    </div>

    <!-- Beam parameters panel (top-left, transparent) -->
    <div id="beam-stats-panel">
      <div class="bsp-row"><span class="bsp-label">Energy</span><span class="bsp-val" id="stat-beam-energy">0.0</span><span class="bsp-unit">GeV</span></div>
      <div class="bsp-row"><span class="bsp-label">Quality</span><span class="bsp-val" id="stat-beam-quality">--</span></div>
      <div class="bsp-row"><span class="bsp-label">Current</span><span class="bsp-val" id="stat-beam-current">--</span><span class="bsp-unit">mA</span></div>
      <div class="bsp-row"><span class="bsp-label">Data</span><span class="bsp-val" id="stat-data-rate">0</span><span class="bsp-unit">/s</span></div>
      <div class="bsp-row"><span class="bsp-label">Length</span><span class="bsp-val" id="stat-length">0</span><span class="bsp-unit">m</span></div>
      <div class="bsp-row"><span class="bsp-label">E Cost</span><span class="bsp-val" id="stat-energy-cost">0</span><span class="bsp-unit">E/s</span></div>
    </div>

    <!-- Beam diagnostics plots (lower-right, expandable) -->
    <div id="beam-plots" class="collapsed">
      <div id="beam-plots-header">
        <span id="beam-plots-title">Beam Diagnostics</span>
        <button id="beam-plots-toggle">+</button>
      </div>
      <div id="beam-plots-body">
        <div class="plot-container">
          <div class="plot-label">Beam Envelope (sigma)</div>
          <canvas id="plot-envelope" width="490" height="160"></canvas>
        </div>
        <div class="plot-container">
          <div class="plot-label">Energy Profile</div>
          <canvas id="plot-energy" width="490" height="130"></canvas>
        </div>
        <div class="plot-container">
          <div class="plot-label">Beam Current</div>
          <canvas id="plot-current" width="490" height="130"></canvas>
        </div>
      </div>
    </div>

    <!-- Component preview panel (lower-left, above bottom HUD) -->
    <div id="component-preview" class="hidden">
      <div id="preview-header">
        <span id="preview-name"></span>
      </div>
      <div id="preview-body">
        <div id="preview-desc"></div>
        <div id="preview-stats"></div>
      </div>
    </div>

    <!-- Bottom HUD (DOM overlay) -->
    <div id="bottom-hud">
      <div id="connection-tools" class="hidden">
        <!-- shown only in facility mode, populated dynamically -->
      </div>
      <div id="hud-controls">
        <div id="mode-switcher">
          <button class="mode-btn active" data-mode="beamline">Beamline</button>
          <button class="mode-btn" data-mode="facility">Facility</button>
          <button class="mode-btn disabled" data-mode="structure">Structure</button>
        </div>
        <div id="category-tabs">
          <!-- dynamically generated based on active mode -->
        </div>
        <div id="hud-buttons">
          <button id="btn-toggle-beam" class="hud-btn btn-beam">Start Beam</button>
        </div>
      </div>
      <div id="component-palette"></div>
    </div>

    <!-- Research overlay (hidden by default) -->
    <div id="research-overlay" class="overlay hidden">
      <div class="overlay-header">
        <span class="overlay-title">Research</span>
        <button class="overlay-close" data-close="research-overlay">&times;</button>
      </div>
      <div class="overlay-body">
        <div id="research-list"></div>
      </div>
    </div>

    <!-- Goals overlay (hidden by default) -->
    <div id="goals-overlay" class="overlay hidden">
      <div class="overlay-header">
        <span class="overlay-title">Goals</span>
        <button class="overlay-close" data-close="goals-overlay">&times;</button>
      </div>
      <div class="overlay-body">
        <div id="goals-list"></div>
      </div>
    </div>

    <!-- Component detail popup (hidden by default) -->
    <div id="component-popup" class="hidden">
      <div class="popup-header">
        <span class="popup-title"></span>
        <button class="popup-close">&times;</button>
      </div>
      <div class="popup-body"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.4/full/pyodide.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>
  <script src="data.js"></script>
  <script src="physics.js"></script>
  <script src="beamline.js"></script>
  <script src="game.js"></script>
  <script src="sprites.js"></script>
  <script src="input.js"></script>
  <script src="renderer.js"></script>
  <script src="probe-plots.js"></script>
  <script src="probe.js"></script>
  <script src="main.js"></script>
</body>
</html>
